      - name: Download APK
        id: download
        env:
          APK_DL_API: ${{ env.APK_DL_API }}
        run: |
          python3 << 'PYEOF'
          import json, subprocess, sys, time, os

          API = os.environ['APK_DL_API']
          PKG = os.environ['PACKAGE_NAME']
          ARCH = os.environ['ARCH']

          def parse_sse(endpoint, max_wait=180):
              """Call an SSE endpoint and return the first success event as JSON."""
              print(f"  Connecting to {endpoint}", flush=True)
              proc = subprocess.Popen(
                  ['curl', '-sN', '--max-time', str(max_wait), endpoint],
                  stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True
              )
              success_data = None
              start = time.time()
              for line in proc.stdout:
                  line = line.strip()
                  if not line:
                      continue
                  if line.startswith('data: '):
                      try:
                          data = json.loads(line[6:])
                          if data.get('type') == 'progress':
                              msg = data.get('message', '')
                              print(f"  [SSE] {msg}", flush=True)
                          elif data.get('type') == 'success':
                              success_data = data
                              break
                      except json.JSONDecodeError:
                          pass
                  if time.time() - start > max_wait:
                      print("  [SSE] Timeout reached", flush=True)
                      break
              proc.terminate()
              try:
                  proc.wait(timeout=10)
              except subprocess.TimeoutExpired:
                  proc.kill()
              return success_data

          def download_file(url, output, cookie_str="", max_time=300):
              """Download a file with optional cookie header."""
              cmd = ['curl', '-sS', '-L', '--max-time', str(max_time), '-o', output]
              if cookie_str:
                  cmd += ['-H', f'Cookie: {cookie_str}']
              cmd.append(url)
              result = subprocess.run(cmd, capture_output=True, text=True)
              return os.path.exists(output) and os.path.getsize(output) > 0

          def fmt_size(path):
              s = os.path.getsize(path)
              return f"{s / 1024 / 1024:.1f} MB"

          print(f"=== Downloading {PKG} ({ARCH}) ===", flush=True)
          print(f"API: {API}", flush=True)

          # JioHotstar is ~146MB — too large for server-side merge on free tier.
          # Go straight to the info stream which only fetches metadata/URLs (fast).
          # The actual APK download goes directly from Google CDN (bypasses the server).

          max_retries = 3
          info = None

          for attempt in range(1, max_retries + 1):
              print(f"\nAttempt {attempt}/{max_retries}: Fetching download info...", flush=True)
              info = parse_sse(f"{API}/api/download-info-stream/{PKG}?arch={ARCH}", max_wait=120)

              if info:
                  print("  Got info response", flush=True)
                  break

              if attempt < max_retries:
                  wait = 15 * attempt
                  print(f"  No response, waiting {wait}s before retry (server may be busy)...", flush=True)
                  time.sleep(wait)

          if not info:
              print("::error::Failed to get download info from API after retries")
              sys.exit(1)

          dl_url = info.get('downloadUrl')
          cookies_list = info.get('cookies', [])
          cookie_str = '; '.join([f"{c['name']}={c['value']}" for c in cookies_list]) if cookies_list else ''
          splits = info.get('splits', [])

          print(f"  App: {info.get('title', PKG)}", flush=True)
          print(f"  Version: {info.get('version')} (code: {info.get('versionCode')})", flush=True)
          print(f"  Base: {info.get('filename')} ({info.get('size')})", flush=True)
          print(f"  Cookie: {cookie_str}", flush=True)
          print(f"  Splits available: {len(splits)}", flush=True)
          for sp in splits:
              print(f"    - {sp.get('name')}: {sp.get('size', 0) // 1024 // 1024} MB", flush=True)

          if not dl_url:
              print("::error::No download URL in info response")
              sys.exit(1)

          # Download base APK from Google Play CDN
          print(f"\n  Downloading base APK from Google CDN...", flush=True)
          if not download_file(dl_url, 'jiohotstar.apk', cookie_str, 300):
              print("::error::Base APK download failed")
              sys.exit(1)

          if os.path.getsize('jiohotstar.apk') < 1000000:
              sz = os.path.getsize('jiohotstar.apk')
              print(f"::error::Base APK too small ({sz} bytes)")
              sys.exit(1)

          print(f"  SUCCESS: Base APK {fmt_size('jiohotstar.apk')}", flush=True)

          for split in splits:
              if 'arm64' in split.get('name', '').lower():
                  split_url = split.get('downloadUrl')
                  if split_url:
                      print(f"\n  Pre-downloading arm64 split ({split.get('name')}) for native lib injection...", flush=True)
                      if download_file(split_url, 'arm64_split.apk', cookie_str, 300):
                          print(f"  Arm64 split saved: {fmt_size('arm64_split.apk')}", flush=True)
                      else:
                          print(f"  WARNING: Arm64 split download failed, will retry during injection", flush=True)
                  break

          print(f"\n=== Download complete: {fmt_size('jiohotstar.apk')} ===", flush=True)
          with open(os.environ.get('GITHUB_OUTPUT', '/dev/null'), 'a') as f:
              f.write(f"downloaded_size={fmt_size('jiohotstar.apk')}\n")

          PYEOF
