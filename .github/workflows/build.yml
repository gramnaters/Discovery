name: JioHotstar AutoBuild

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Specific version (leave empty for latest)'
        required: false
        type: string
        default: ''
  schedule:
    - cron: '0 6 * * *'
  push:
    paths:
      - 'cookies/**'
      - 'patches/**'
      - 'scripts/**'

env:
  PACKAGE_NAME: in.startv.hotstar
  ARCH: arm64-v8a
  APK_DL_API: https://gplay-apk-downloader-zyuj.onrender.com

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install apktool
        run: |
          APKTOOL_URL=$(curl -sL "https://api.github.com/repos/iBotPeaches/Apktool/releases/latest" | \
            python3 -c "import sys,json; print(json.load(sys.stdin)['assets'][0]['browser_download_url'])")
          echo "Downloading apktool from: $APKTOOL_URL"
          curl -sL "$APKTOOL_URL" -o /usr/local/bin/apktool.jar
          echo '#!/bin/bash' > /usr/local/bin/apktool
          echo 'exec java -jar /usr/local/bin/apktool.jar "$@"' >> /usr/local/bin/apktool
          chmod +x /usr/local/bin/apktool
          apktool --version

      - name: Validate cookie files
        run: |
          echo "=== Cookie files ==="
          REQUIRED=(sessionUserUP.txt userHID.txt userPID.txt deviceId.txt)
          MISSING=()
          EMPTY=()
          for f in "${REQUIRED[@]}"; do
            if [ ! -f "cookies/$f" ]; then
              MISSING+=("$f")
            elif [ ! -s "cookies/$f" ]; then
              EMPTY+=("$f")
            else
              echo "  $f: $(wc -c < cookies/$f) bytes"
            fi
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing cookie files: ${MISSING[*]}"
            exit 1
          fi
          if [ ${#EMPTY[@]} -gt 0 ]; then
            echo "::warning::Empty cookie files: ${EMPTY[*]}"
          fi
          if [ -f cookies/media_token.txt ]; then
            echo "  media_token.txt: $(wc -c < cookies/media_token.txt) bytes"
          fi
          echo "All cookies validated."

      - name: Download APK
        id: download
        env:
          APK_DL_API: ${{ env.APK_DL_API }}
        run: |
          python3 << 'PYEOF'
          import json, subprocess, sys, time, os

          API = os.environ['APK_DL_API']
          PKG = os.environ['PACKAGE_NAME']
          ARCH = os.environ['ARCH']

          def parse_sse(endpoint, max_wait=180):
              """Call an SSE endpoint and return the first success event as JSON."""
              print(f"  Connecting to {endpoint}", flush=True)
              proc = subprocess.Popen(
                  ['curl', '-sN', '--max-time', str(max_wait), endpoint],
                  stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True
              )
              success_data = None
              start = time.time()
              for line in proc.stdout:
                  line = line.strip()
                  if not line:
                      continue
                  if line.startswith('data: '):
                      try:
                          data = json.loads(line[6:])
                          if data.get('type') == 'progress':
                              msg = data.get('message', '')
                              print(f"  [SSE] {msg}", flush=True)
                          elif data.get('type') == 'success':
                              success_data = data
                              break
                      except json.JSONDecodeError:
                          pass
                  if time.time() - start > max_wait:
                      print("  [SSE] Timeout reached", flush=True)
                      break
              proc.terminate()
              try:
                  proc.wait(timeout=10)
              except subprocess.TimeoutExpired:
                  proc.kill()
              return success_data

          def download_file(url, output, cookie_str="", max_time=300):
              """Download a file with optional cookie header."""
              cmd = ['curl', '-sS', '-L', '--max-time', str(max_time), '-o', output]
              if cookie_str:
                  cmd += ['-H', f'Cookie: {cookie_str}']
              cmd.append(url)
              result = subprocess.run(cmd, capture_output=True, text=True)
              return os.path.exists(output) and os.path.getsize(output) > 0

          def fmt_size(path):
              s = os.path.getsize(path)
              return f"{s / 1024 / 1024:.1f} MB"

          def process_download_info(info):
              """Extract download info and download base + arm64 split."""
              dl_url = info.get('downloadUrl')
              cookies_list = info.get('cookies', [])
              cookie_str = '; '.join([f"{c['name']}={c['value']}" for c in cookies_list]) if cookies_list else ''
              splits = info.get('splits', [])

              print(f"  App: {info.get('title', PKG)}", flush=True)
              print(f"  Version: {info.get('version')} (code: {info.get('versionCode')})", flush=True)
              print(f"  Base: {info.get('filename')} ({info.get('size')})", flush=True)
              print(f"  Cookie: {cookie_str}", flush=True)
              print(f"  Splits available: {len(splits)}", flush=True)
              for sp in splits:
                  print(f"    - {sp.get('name')}: {sp.get('size', 0) // 1024 // 1024} MB", flush=True)

              if not dl_url:
                  print("::error::No download URL in info response")
                  return False

              print(f"\n  Downloading base APK from Google CDN...", flush=True)
              if not download_file(dl_url, 'jiohotstar.apk', cookie_str, 300):
                  print("::error::Base APK download failed")
                  return False

              if os.path.getsize('jiohotstar.apk') < 1000000:
                  sz = os.path.getsize('jiohotstar.apk')
                  print(f"::error::Base APK too small ({sz} bytes)")
                  return False

              print(f"  SUCCESS: Base APK {fmt_size('jiohotstar.apk')}", flush=True)

              for split in splits:
                  if 'arm64' in split.get('name', '').lower():
                      split_url = split.get('downloadUrl')
                      if split_url:
                          print(f"\n  Pre-downloading arm64 split ({split.get('name')}) for native lib injection...", flush=True)
                          if download_file(split_url, 'arm64_split.apk', cookie_str, 300):
                              print(f"  Arm64 split saved: {fmt_size('arm64_split.apk')}", flush=True)
                          else:
                              print(f"  WARNING: Arm64 split download failed, will retry during injection", flush=True)
                      break

              print(f"\n=== Download complete: {fmt_size('jiohotstar.apk')} ===", flush=True)
              with open(os.environ.get('GITHUB_OUTPUT', '/dev/null'), 'a') as f:
                  f.write(f"downloaded_size={fmt_size('jiohotstar.apk')}\n")
              return True

          print(f"=== Downloading {PKG} ({ARCH}) ===", flush=True)
          print(f"API: {API}", flush=True)

          # Method 1: Try download-info-stream SSE first (simpler than merged, handles auth internally)
          print("\nMethod 1: Direct CDN download via info stream SSE...", flush=True)
          info = parse_sse(f"{API}/api/download-info-stream/{PKG}?arch={ARCH}", max_wait=180)
          if info and info.get('downloadUrl'):
              if process_download_info(info):
                  sys.exit(0)
              else:
                  os.remove('jiohotstar.apk') if os.path.exists('jiohotstar.apk') else None
          else:
              print(f"  Method 1: no download URL from info stream", flush=True)

          os.remove('jiohotstar.apk') if os.path.exists('jiohotstar.apk') else None

          # Method 2: Merged download via merged-stream SSE (fallback, may time out for large apps)
          print("\nMethod 2: Merged download via SSE stream...", flush=True)
          merged = parse_sse(f"{API}/api/download-merged-stream/{PKG}?arch={ARCH}", max_wait=300)

          if merged and merged.get('download_id'):
              dl_id = merged['download_id']
              print(f"  Got download_id: {dl_id}", flush=True)
              print(f"  Downloading merged APK...", flush=True)
              if download_file(f"{API}/api/download-temp/{dl_id}", 'jiohotstar.apk'):
                  if os.path.getsize('jiohotstar.apk') > 5000000:
                      print(f"  SUCCESS: Merged APK {fmt_size('jiohotstar.apk')}", flush=True)
                      with open(os.environ.get('GITHUB_OUTPUT', '/dev/null'), 'a') as f:
                          f.write(f"downloaded_size={fmt_size('jiohotstar.apk')}\n")
                      sys.exit(0)
                  else:
                      print(f"  Merged APK too small ({os.path.getsize('jiohotstar.apk')} bytes)", flush=True)
              else:
                  print(f"  Failed to download merged APK from temp endpoint", flush=True)
          else:
              print(f"  Merged download did not return download_id (may have timed out for large app)", flush=True)

          print("::error::All download methods exhausted")
          sys.exit(1)
          else:
              print("::error::Download failed after getting info")
              sys.exit(1)

          PYEOF

      - name: Decompile APK
        id: decompile
        run: |
          echo "Decompiling with apktool..."
          apktool d jiohotstar.apk -o decompiled -f 2>&1 | tail -5
          echo "Decompiled OK"

          VCODE=$(grep -oP '^\s*versionCode:\s*\K[0-9]+' decompiled/apktool.yml 2>/dev/null | head -1) || true
          VNAME=$(grep -oP "^\s*versionName:\s*\K[^'\"\n]+" decompiled/apktool.yml 2>/dev/null | tr -d "'\"" | head -1) || true
          echo "version_code=${VCODE:-unknown}" >> $GITHUB_OUTPUT
          echo "version_name=${VNAME:-unknown}" >> $GITHUB_OUTPUT
          echo "Extracted version: code=${VCODE:-?} name=${VNAME:-?}"

      - name: Remove split APK flags & fix resources
        run: |
          MANIFEST="decompiled/AndroidManifest.xml"

          if grep -q 'android:isSplitRequired' "$MANIFEST"; then
            sed -i 's/ android:isSplitRequired="[^"]*"//g' "$MANIFEST"
            echo "Fixed: removed isSplitRequired"
          fi
          if grep -q 'android:requiredSplitTypes' "$MANIFEST"; then
            sed -i 's/ android:requiredSplitTypes="[^"]*"//g' "$MANIFEST"
            echo "Fixed: removed requiredSplitTypes"
          fi
          if grep -q 'android:splitTypes' "$MANIFEST"; then
            sed -i 's/ android:splitTypes="[^"]*"//g' "$MANIFEST"
            echo "Fixed: removed splitTypes"
          fi
          if grep -q 'com.android.vending.splits.required' "$MANIFEST"; then
            sed -i '/com.android.vending.splits.required/d' "$MANIFEST"
            echo "Fixed: removed splits.required meta-data"
          fi
          if grep -q 'android:name="com.android.vending.splits"' "$MANIFEST"; then
            sed -i '/android:name="com.android.vending.splits"/d' "$MANIFEST"
            echo "Fixed: removed splits meta-data"
          fi

          if grep -q 'android:extractNativeLibs="false"' "$MANIFEST"; then
            sed -i 's/android:extractNativeLibs="false"/android:extractNativeLibs="true"/g' "$MANIFEST"
            echo "Fixed: extractNativeLibs=true"
          fi

          if grep -q 'android:intentMatchingFlags' "$MANIFEST"; then
            sed -i 's/android:intentMatchingFlags="[^"]*" //g' "$MANIFEST"
            echo "Fixed: removed intentMatchingFlags"
          fi

          NULL_COUNT=$(grep -rl 'android:drawable="@null"' decompiled/res/drawable* 2>/dev/null | wc -l)
          if [ "$NULL_COUNT" -gt 0 ]; then
            find decompiled/res/drawable* -name "*.xml" -exec \
              sed -i 's/android:drawable="@null"/android:drawable="@android:color\/transparent"/g' {} \; 2>/dev/null
            echo "Fixed $NULL_COUNT drawable files: @null -> @android:color/transparent"
          fi

      - name: Inject smali patches
        run: |
          SMALI_DIR=""
          SMALLEST=999999
          for dir in decompiled/smali*/; do
            COUNT=$(find "$dir" -name "*.smali" -type f 2>/dev/null | wc -l)
            if [ "$COUNT" -lt "$SMALLEST" ]; then
              SMALLEST=$COUNT
              SMALI_DIR="$dir"
            fi
          done
          [ -z "$SMALI_DIR" ] && SMALI_DIR="decompiled/smali/"
          echo "Using smali dir: $SMALI_DIR ($SMALLEST files)"

          TARGET="$SMALI_DIR/com/hotstar/patch"
          mkdir -p "$TARGET"
          cp patches/CookieFileReader.smali "$TARGET/CookieFileReader.smali"
          cp patches/cookie-seeder.smali "$TARGET/CookieSeeder.smali"
          echo "Smali patches injected"

          mkdir -p decompiled/assets/cookies
          for f in cookies/*.txt; do
            [ -f "$f" ] && cp "$f" "decompiled/assets/cookies/$(basename "$f")"
            echo "  $(basename "$f") -> assets/cookies/"
          done
          echo "Cookie assets injected"

      - name: Patch Application class (CookieSeeder hook)
        run: |
          MANIFEST="decompiled/AndroidManifest.xml"
          APP_CLASS=$(grep -oP '<application[^>]*android:name="\K[^"]+' "$MANIFEST")
          echo "Application class: $APP_CLASS"

          SMALI_PATH="${APP_CLASS//./\/}.smali"
          FULL_PATH=""
          for dir in decompiled/smali*/; do
            if [ -f "${dir}${SMALI_PATH}" ]; then
              FULL_PATH="${dir}${SMALI_PATH}"
              break
            fi
          done

          if [ -z "$FULL_PATH" ]; then
            CLASS_NAME=$(echo "$APP_CLASS" | sed 's/.*\.//')
            FULL_PATH=$(find decompiled -path "*/smali*" -name "${CLASS_NAME}.smali" -type f 2>/dev/null | head -1)
          fi

          if [ -z "$FULL_PATH" ]; then
            echo "::error::Application class not found: $APP_CLASS"
            exit 1
          fi
          echo "Found: $FULL_PATH"

          if grep -q "CookieSeeder" "$FULL_PATH"; then
            echo "Already patched, skipping"
            exit 0
          fi

          INJECT='    invoke-static {p0}, Lcom/hotstar/patch/CookieSeeder;->seedIfNeeded(Landroid/content/Context;)V'

          LINE_NUM=$(grep -n "invoke-super" "$FULL_PATH" | head -1 | cut -d: -f1)
          if [ -n "$LINE_NUM" ]; then
            sed -i "${LINE_NUM}a\\${INJECT}" "$FULL_PATH"
            echo "Patched: after invoke-super (line $LINE_NUM)"
          else
            echo "::error::No invoke-super found in Application class"
            exit 1
          fi

          grep -q "CookieSeeder" "$FULL_PATH" && echo "Verification: PASSED" || { echo "::error::Verification FAILED"; exit 1; }

      - name: Patch IdentityRepository (LDf/d)
        run: |
          ID_REPO=""
          for dir in decompiled/smali*/; do
            if [ -f "${dir}Ff/d.smali" ]; then
              ID_REPO="${dir}Ff/d.smali"
              break
            fi
          done

          if [ -z "$ID_REPO" ]; then
            echo "::warning::IdentityRepository (Ff/d.smali) not found in this version - skipping"
            exit 0
          fi
          echo "Found: $ID_REPO"

          if grep -q "CookieSeeder.*getInjectedUserToken" "$ID_REPO"; then
            echo "Already patched, skipping"
            exit 0
          fi

          awk '
          BEGIN { in_c = 0; in_i = 0; in_ann = 0; first_inst = 0; }

          /\.method public final c\(Ltt\/d;\)Ljava\/lang\/Object;/ {
            in_c = 1; in_i = 0; in_ann = 0; first_inst = 0
            print; next
          }
          in_c == 1 {
            if (/\.locals 1$/) { sub(/\.locals 1$/, ".locals 2"); print; next }
            if (/\.annotation build/) { in_ann = 1 }
            if (/\.end annotation/) { in_ann = 0 }
            if (/^\s*\.line [0-9]+\s*$/ && first_inst == 0 && !in_ann) { next }
            if (/iget-object v0, p0, LFf\/d;->a:Ljava\/lang\/String;/ && first_inst == 0) {
              first_inst = 1
              print ""
              print "    # PATCH: inject user token when field a is null"
              print "    iget-object v0, p0, LFf/d;->a:Ljava/lang/String;"
              print "    if-nez v0, :patch_orig_c"
              print ""
              print "    invoke-static {}, Lcom/hotstar/patch/CookieSeeder;->getInjectedUserToken()Ljava/lang/String;"
              print "    move-result-object v1"
              print "    if-nez v1, :patch_orig_c"
              print ""
              print "    iput-object v1, p0, LFf/d;->a:Ljava/lang/String;"
              print "    return-object v1"
              print ""
              print "    :patch_orig_c"
              print ""
            }
            if (/^\.end method/) { in_c = 0 }
            print; next
          }

          /\.method public final i\(Lye\/J;\)Ljava\/lang\/Object;/ {
            in_i = 1; in_c = 0; in_ann = 0; first_inst = 0
            print; next
          }
          in_i == 1 {
            if (/\.locals 1$/) { sub(/\.locals 1$/, ".locals 2"); print; next }
            if (/\.annotation build/) { in_ann = 1 }
            if (/\.end annotation/) { in_ann = 0 }
            if (/^\s*\.line [0-9]+\s*$/ && first_inst == 0 && !in_ann) { next }
            if (/iget-object v0, p0, LFf\/d;->g:Ljava\/lang\/String;/ && first_inst == 0) {
              first_inst = 1
              print ""
              print "    # PATCH: inject media token when field g is null"
              print "    iget-object v0, p0, LFf/d;->g:Ljava/lang/String;"
              print "    if-nez v0, :patch_orig_i"
              print ""
              print "    invoke-static {}, Lcom/hotstar/patch/CookieSeeder;->getInjectedMediaToken()Ljava/lang/String;"
              print "    move-result-object v1"
              print "    if-nez v1, :patch_orig_i"
              print ""
              print "    iput-object v1, p0, LFf/d;->g:Ljava/lang/String;"
              print "    return-object v1"
              print ""
              print "    :patch_orig_i"
              print ""
            }
            if (/^\.end method/) { in_i = 0 }
            print; next
          }

          { print }
          ' "$ID_REPO" > patched_d.smali

          [ ! -s patched_d.smali ] && { echo "::error::Patching produced empty file"; exit 1; }
          mv patched_d.smali "$ID_REPO"

          grep -q "CookieSeeder.*getInjectedUserToken" "$ID_REPO" && echo "getUserToken patch: OK" || { echo "::error::getUserToken patch FAILED"; exit 1; }
          grep -q "CookieSeeder.*getInjectedMediaToken" "$ID_REPO" && echo "getMediaToken patch: OK" || { echo "::error::getMediaToken patch FAILED"; exit 1; }

      - name: Recompile APK
        run: |
          echo "Recompiling..."
          apktool b decompiled -o jiohotstar_unsigned.apk 2>&1 | tail -10
          [ ! -f jiohotstar_unsigned.apk ] && { echo "::error::Recompile failed"; exit 1; }
          echo "Recompiled: $(du -h jiohotstar_unsigned.apk | cut -f1)"

      - name: Check native libs
        id: native_check
        run: |
          LIB_COUNT=$(unzip -l jiohotstar_unsigned.apk 2>/dev/null | grep -c "lib/.*\.so" || true)
          echo "Native libs in rebuilt APK: $LIB_COUNT"
          echo "lib_count=$LIB_COUNT" >> $GITHUB_OUTPUT

      - name: Inject native libs (if missing)
        if: steps.native_check.outputs.lib_count == '0'
        env:
          APK_DL_API: ${{ env.APK_DL_API }}
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: |
          echo "No native libs found, need arm64 split..."
          PKG="${{ env.PACKAGE_NAME }}"
          ARCH="${{ env.ARCH }}"
          API="${{ env.APK_DL_API }}"
          LIB_SOURCE=""

          if [ -f arm64_split.apk ] && [ "$(stat -c%s arm64_split.apk 2>/dev/null || echo 0)" -gt 1000000 ]; then
            SO_COUNT=$(unzip -l arm64_split.apk 2>/dev/null | grep -c "lib/arm64.*\.so" || true)
            if [ "$SO_COUNT" -gt 0 ]; then
              echo "Using pre-downloaded arm64 split ($SO_COUNT .so files)"
              LIB_SOURCE="arm64_split.apk"
            fi
          fi

          if [ -z "$LIB_SOURCE" ]; then
            echo "Downloading arm64 split info from API..."
            ARM64_INFO=$(curl -sS --max-time 60 "${API}/api/download-info/${PKG}?arch=${ARCH}" 2>/dev/null)
            if [ -z "$ARM64_INFO" ] || ! echo "$ARM64_INFO" | python3 -c "import sys,json; d=json.load(sys.stdin); sys.exit(0 if d.get('success') and d.get('downloadUrl') else 1)" 2>/dev/null; then
              # SSE fallback if JSON endpoint fails
              ARM64_INFO=$(curl -sN --max-time 120 "${API}/api/download-info-stream/${PKG}?arch=${ARCH}" 2>/dev/null | while IFS= read -r line; do
                if echo "$line" | grep -q '"type":"success"'; then
                  echo "$line" | sed 's/^data: //'
                  break
                fi
              done)
            fi

            if [ -n "$ARM64_INFO" ]; then
              ARM64_URL=$(echo "$ARM64_INFO" | python3 -c "
              import sys, json
              data = json.load(sys.stdin)
              for s in data.get('splits', []):
                  if 'arm64' in s.get('name', '').lower():
                      print(s.get('downloadUrl', ''))
                      break
              " 2>/dev/null)

              COOKIE_STR=$(echo "$ARM64_INFO" | python3 -c "
              import sys, json
              data = json.load(sys.stdin)
              cookies = data.get('cookies', [])
              print('; '.join([f\"{c['name']}={c['value']}\" for c in cookies]))
              " 2>/dev/null)

              if [ -n "$ARM64_URL" ]; then
                echo "Downloading arm64 split from Google CDN..."
                curl -sS -L --max-time 300 -H "Cookie: ${COOKIE_STR}" \
                  -o arm64_fallback.apk "$ARM64_URL" 2>/dev/null
                if [ -f arm64_fallback.apk ] && [ "$(stat -c%s arm64_fallback.apk 2>/dev/null || echo 0)" -gt 1000000 ]; then
                  SO_COUNT=$(unzip -l arm64_fallback.apk 2>/dev/null | grep -c "lib/arm64.*\.so" || true)
                  if [ "$SO_COUNT" -gt 0 ]; then
                    echo "Downloaded arm64 split ($SO_COUNT .so files)"
                    LIB_SOURCE="arm64_fallback.apk"
                  fi
                fi
              fi
            fi
          fi

          if [ -z "$LIB_SOURCE" ]; then
            echo "WARNING: Could not get arm64 split, app may lack native libraries"
          fi

          if [ -n "$LIB_SOURCE" ]; then
            echo "Extracting native libs from $LIB_SOURCE..."
            mkdir -p lib_tmp
            unzip -o "$LIB_SOURCE" "lib/*" -d lib_tmp 2>/dev/null || true

            cp jiohotstar_unsigned.apk jiohotstar_mod.apk
            zip -d jiohotstar_mod.apk "META-INF/MANIFEST.MF" "META-INF/*.SF" "META-INF/*.RSA" "META-INF/*.MF" 2>/dev/null || true
            (cd lib_tmp && zip -r ../jiohotstar_mod.apk lib/ 2>/dev/null)
            rm -rf lib_tmp

            BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/*/ 2>/dev/null | sort -V | tail -1)
            export PATH="${BUILD_TOOLS}:${PATH}"

            zipalign -f 4 jiohotstar_mod.apk jiohotstar_aligned.apk
            keytool -genkeypair -v -keystore sign.keystore -alias hotstar -keyalg RSA \
              -keysize 2048 -validity 10000 -storepass hotstarpatch -keypass hotstarpatch \
              -dname "CN=Patcher, OU=Patch, O=HP, L=X, ST=X, C=XX" 2>/dev/null
            apksigner sign --ks sign.keystore --ks-pass pass:hotstarpatch \
              --ks-key-alias hotstar --key-pass pass:hotstarpatch \
              --out jiohotstar_patched.apk jiohotstar_aligned.apk 2>/dev/null

            echo "Native lib injection complete"
            rm -f jiohotstar_mod.apk jiohotstar_aligned.apk arm64_fallback.apk
          else
            echo "No arm64 split available, skipping native lib injection"
            cp jiohotstar_unsigned.apk jiohotstar_patched.apk
          fi

      - name: Sign APK (when libs already present)
        if: steps.native_check.outputs.lib_count != '0'
        run: |
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/*/ 2>/dev/null | sort -V | tail -1)
          export PATH="${BUILD_TOOLS}:${PATH}"

          keytool -genkeypair -v -keystore sign.keystore -alias hotstar -keyalg RSA \
            -keysize 2048 -validity 10000 -storepass hotstarpatch -keypass hotstarpatch \
            -dname "CN=Patcher, OU=Patch, O=HP, L=X, ST=X, C=XX" 2>/dev/null

          zipalign -f 4 jiohotstar_unsigned.apk jiohotstar_aligned.apk
          apksigner sign --ks sign.keystore --ks-pass pass:hotstarpatch \
            --ks-key-alias hotstar --key-pass pass:hotstarpatch \
            --out jiohotstar_patched.apk jiohotstar_aligned.apk 2>/dev/null

          apksigner verify jiohotstar_patched.apk 2>/dev/null && echo "Signature: OK" || echo "Signature: verify failed (may still work)"
          rm -f jiohotstar_aligned.apk
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Final APK info
        id: final
        run: |
          [ ! -f jiohotstar_patched.apk ] && { echo "::error::Final APK missing"; exit 1; }
          SIZE=$(du -h jiohotstar_patched.apk | cut -f1)
          echo "Final APK: $SIZE"
          echo "apk_size=$SIZE" >> $GITHUB_OUTPUT
          LIBS=$(unzip -l jiohotstar_patched.apk 2>/dev/null | grep -c "lib/arm64.*\.so" || true)
          echo "arm64 native libs: $LIBS"

      - name: Rename APK
        run: |
          VERSION="${{ steps.decompile.outputs.version_code }}"
          VNAME="${{ steps.decompile.outputs.version_name }}"
          DATE=$(date +'%Y%m%d')
          if [ "$VERSION" != "unknown" ] && [ "$VNAME" != "unknown" ]; then
            FINAL_NAME="JioHotstar-Premium-v${VNAME}-${DATE}-arm64.apk"
          elif [ "$VERSION" != "unknown" ]; then
            FINAL_NAME="JioHotstar-Premium-v${VERSION}-${DATE}-arm64.apk"
          else
            FINAL_NAME="JioHotstar-Premium-${DATE}-arm64.apk"
          fi
          cp jiohotstar_patched.apk "$FINAL_NAME"
          echo "FINAL_NAME=$FINAL_NAME" >> $GITHUB_ENV
          echo "APK name: $FINAL_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jiohotstar-patched-apk
          path: JioHotstar-Premium-*.apk
          retention-days: 7

      - name: Delete old release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "JioHotstar Premium ${{ steps.decompile.outputs.version_name != 'unknown' && format('v{0}', steps.decompile.outputs.version_name) || 'Latest Build' }}"
          body: |
            Automated build from GitHub Actions

            **Version Code**: `${{ steps.decompile.outputs.version_code }}`
            **Version Name**: `${{ steps.decompile.outputs.version_name }}`
            **Size**: `${{ steps.final.outputs.apk_size }}`
            **Architecture**: arm64-v8a

            ### Features
            - Premium account auto-login via cookie injection
            - No root required
            - Ad-free experience (with premium cookies)
            - All content unlocked

            ### How to use
            1. Uninstall any existing JioHotstar
            2. Download and install this APK
            3. Launch - you will be logged in automatically

            > Cookies auto-refresh after first login. Rebuild when cookies expire.

            ---
            *Built by [JioHotstar AutoBuild](https://github.com/${{ github.repository }})*
          files: JioHotstar-Premium-*.apk
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup workflow runs
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 3
          keep_minimum_runs: 5
